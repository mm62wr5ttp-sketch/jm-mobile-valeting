<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Thank You | JM Mobile Valeting</title>
    <style>
      :root {
        color-scheme: dark;
        --electric: #2563eb;
        --charcoal: #05070a;
        --panel: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.28), transparent 34%),
          linear-gradient(135deg, #05070a 0%, #111827 52%, #05070a 100%);
        color: white;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(680px, 100%);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(20px);
        text-align: center;
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        background: var(--electric);
        box-shadow: 0 0 45px rgba(37, 99, 235, 0.45);
        font-size: 34px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 8vw, 62px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 20px auto 0;
        max-width: 520px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        margin-top: 34px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      a {
        min-height: 52px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        padding: 14px 20px;
        color: white;
        text-decoration: none;
        font-weight: 900;
      }

      .primary {
        background: var(--electric);
        box-shadow: 0 0 35px rgba(37, 99, 235, 0.35);
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">✓</div>
      <h1>Thanks</h1>
      <p>Thanks — your quote request has been sent. We’ll get back to you shortly.</p>
      <div class="actions">
        <a class="primary" href="/jm-exterior-cleaning/mobile-valeting.html">Back to Home</a>
        <a class="secondary" href="tel:07511053653">Call Now</a>
        <a class="secondary" href="https://wa.me/447511053653">WhatsApp Us</a>
      </div>
    </main>
  </body>
</html>
