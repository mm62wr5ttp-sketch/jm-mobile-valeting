<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Thanks | JM Exterior Cleaning</title>
    <style>
      :root {
        color-scheme: dark;
        --graphite: #1f2937;
        --ink: #05070a;
        --electric: #2563eb;
        --soft: #e8f0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: white;
        background:
          radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.32), transparent 34%),
          linear-gradient(135deg, var(--ink), var(--graphite));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(760px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        padding: clamp(28px, 7vw, 64px);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: var(--electric);
        box-shadow: 0 0 38px rgba(37, 99, 235, 0.55);
        font-size: 34px;
        font-weight: 900;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #bfdbfe;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 7vw, 68px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 24px auto 0;
        max-width: 560px;
        color: rgba(255, 255, 255, 0.76);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        margin-top: 34px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      a {
        min-width: 150px;
        border-radius: 14px;
        padding: 15px 22px;
        color: white;
        text-decoration: none;
        font-weight: 900;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      a:hover {
        transform: translateY(-2px);
      }

      .primary {
        background: var(--electric);
        box-shadow: 0 0 28px rgba(37, 99, 235, 0.45);
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="mark">✓</div>
      <p class="eyebrow">Quote request sent</p>
      <h1>Thank you</h1>
      <p>Thanks — your quote request has been sent. We’ll get back to you shortly.</p>
      <div class="actions">
        <a class="primary" href="/jm-exterior-cleaning/">Back to Home</a>
        <a class="secondary" href="tel:07511053653">Call Now</a>
        <a class="secondary" href="https://wa.me/447511053653">WhatsApp Us</a>
      </div>
    </main>
  </body>
</html>
